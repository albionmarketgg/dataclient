# Builds the Windows installer (Inno Setup) and publishes a GitHub Release.
#
# Distribution model A: the website's download link points at
#   https://github.com/<owner>/<repo>/releases/latest/download/AlbionMarketDataClient-Setup.exe
# That URL matches by EXACT filename, so every release uploads a stable-named
# asset (AlbionMarketDataClient-Setup.exe) plus a versioned copy. The version
# lives in the tag/release title, not the stable filename.
#
# The installer (build/windows/installer/albionmarket.iss) bundles WinPcap 4.1.3
# and the Microsoft-signed WebView2 bootstrapper (build/windows/thirdparty), so it
# downloads/executes nothing from the internet at install time.
#
# Trigger: push a tag like v1.2.3, or run manually (workflow_dispatch).

name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.1.0)"
        required: true

permissions:
  contents: write

env:
  NPCAP_SDK_URL: https://npcap.com/dist/npcap-sdk-1.13.zip
  STABLE_ASSET: AlbionMarketDataClient-Setup.exe
  ISCC: C:\Program Files (x86)\Inno Setup 6\ISCC.exe

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: ver
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install build tools (mingw gcc + Inno Setup)
        shell: pwsh
        run: |
          choco install -y --no-progress mingw innosetup

      - name: Verify toolchain
        shell: pwsh
        run: |
          gcc --version
          if (-not (Test-Path "$env:ISCC")) { throw "ISCC not found at $env:ISCC" }
          Write-Host "Inno Setup present: $env:ISCC"

      - name: Install Npcap SDK (build-time cgo dependency)
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "$env:NPCAP_SDK_URL" -OutFile npcap-sdk.zip
          Expand-Archive -Path npcap-sdk.zip -DestinationPath "$env:GITHUB_WORKSPACE\npcap-sdk" -Force
          "CGO_ENABLED=1"                                          | Out-File $env:GITHUB_ENV -Append
          "CGO_CFLAGS=-I$env:GITHUB_WORKSPACE\npcap-sdk\Include"   | Out-File $env:GITHUB_ENV -Append
          "CGO_LDFLAGS=-L$env:GITHUB_WORKSPACE\npcap-sdk\Lib\x64"  | Out-File $env:GITHUB_ENV -Append

      - name: Install Wails CLI
        shell: pwsh
        run: |
          go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0
          "$env:USERPROFILE\go\bin" | Out-File $env:GITHUB_PATH -Append

      - name: Build app (no bundled installer; Inno does that next)
        shell: pwsh
        run: |
          wails build -platform windows/amd64 -ldflags "-X main.version=${{ steps.ver.outputs.version }}"

      - name: Compile installer (Inno Setup, bundles WinPcap + WebView2)
        shell: pwsh
        run: |
          & "$env:ISCC" /DMyAppVersion=${{ steps.ver.outputs.version }} build\windows\installer\albionmarket.iss
          if (-not (Test-Path "build\bin\AlbionMarketDataClient-Setup.exe")) { throw "installer not produced" }

      - name: Stage release assets (stable + versioned names)
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          Copy-Item "build\bin\AlbionMarketDataClient-Setup.exe" "dist\$env:STABLE_ASSET"
          Copy-Item "build\bin\AlbionMarketDataClient-Setup.exe" "dist\AlbionMarketDataClient-${{ steps.ver.outputs.version }}-Setup.exe"
          Get-ChildItem dist

      # NOTE: unsigned installers can still trigger SmartScreen "unknown publisher"
      # warnings. To sign, add a signing step here before the release.

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: Albion Market Data Client ${{ steps.ver.outputs.tag }}
          draft: false
          prerelease: false
          files: |
            dist/AlbionMarketDataClient-Setup.exe
            dist/AlbionMarketDataClient-${{ steps.ver.outputs.version }}-Setup.exe
